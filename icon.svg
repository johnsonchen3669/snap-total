<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 130" width="100%" height="100%">
  <!-- Icon 區塊 (相機與加總器)，調整為正方形完美居中 -->
  <g stroke="#1F2937" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 相機主機身 -->
    <rect x="25" y="45" width="80" height="55" rx="14" />
    <!-- 機身頂部 (閃光燈/頂蓋部位) -->
    <path d="M 42 45 L 48 30 L 82 30 L 88 45" />
    <!-- 鏡頭 / 硬幣意象 -->
    <circle cx="65" cy="72.5" r="16" />
    <!-- 鏡頭內的「＋」字號，代表「累計 / Total」的功能核心 -->
    <path d="M 65 62.5 L 65 82.5 M 55 72.5 L 75 72.5" stroke-width="5" />
    <!-- 補光燈小圓點 -->
    <circle cx="42" cy="58" r="2.5" fill="#1F2937" stroke="none" />
  </g>
</svg>